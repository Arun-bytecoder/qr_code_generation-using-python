<!DOCTYPE html>
<html>
<head>
    <title>QR Generator</title>
</head>
<body>
    <h2>QR Code Generator</h2>
    
    <form method="POST">
        <input type="text" name="data" placeholder="Enter text or URL" required>
        <button type="submit">Generate</button>
    </form>

    {% if qr %}
        <h3>Your QR Code:</h3>
        <img src="{{ qr }}" width="200">
    {% endif %}
</body>
</html>
